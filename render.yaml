services:
  - type: web
    name: scam-shield
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
      - key: SANDBOX
        value: "false"
      - key: TRUST_PROXY
        value: "true"
      - key: PORT
        generateValue: false
        value: "10000"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: PI_SERVER_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: scam_shield
      - key: MONGO_PAYMENTS_COLLECTION
        value: donation_payments
